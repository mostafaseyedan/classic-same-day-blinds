options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _AR_REPO: cloud-run
  _COMMERCE_SERVICE: blinds-commerce
  _OPS_API_SERVICE: blinds-ops-api
  _STOREFRONT_SERVICE: blinds-storefront
  _SQL_INSTANCE: blinds-postgres
  _SQL_DATABASE: blinds_commerce
  _SQL_USER: blindsapp
  _REDIS_INSTANCE: blinds-redis
  _VPC_CONNECTOR: blinds-serverless
  _RUNTIME_SERVICE_ACCOUNT: csdb-app@classic-same-day-blinds.iam.gserviceaccount.com
  _MEDUSA_ADMIN_PATH: /app
  _DB_PASSWORD: ""
  _JWT_SECRET: ""
  _COOKIE_SECRET: ""
  _MEDUSA_PUBLISHABLE_KEY: ""
  _STRIPE_PUBLISHABLE_KEY: ""
  _STRIPE_SECRET_KEY: ""
  _STRIPE_WEBHOOK_SECRET: ""
  _MEDUSA_ADMIN_EMAIL: ""
  _MEDUSA_ADMIN_PASSWORD: ""
  _RESEND_API_KEY: ""
  _EMAIL_FROM: orders@classicsamedayblinds.local
  _EMAIL_ADMIN_RECIPIENTS: ops@classicsamedayblinds.local
  _INTERNAL_API_SECRET: ""
  _GOOGLE_PLACES_API_KEY: ""
  _GOOGLE_PLACE_ID: ""
  _NEXT_PUBLIC_GOOGLE_PLACE_URL: ""
  _NEXT_PUBLIC_CHAT_SERVICE_URL: ""
  _GCS_BUCKET_NAME: ""
  _GCS_ACCESS_KEY_ID: ""
  _GCS_SECRET_ACCESS_KEY: ""
  _GCS_REGION: us-central1
  _LLM_PROVIDER: ""
  _VERTEX_PROJECT_ID: ""
  _VERTEX_LOCATION: ""
  _VERTEX_MODEL: ""

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: prepare-runtime
    entrypoint: bash
    args:
      - -ceu
      - |
        required_values=(
          "$_MEDUSA_PUBLISHABLE_KEY"
          "$_STRIPE_PUBLISHABLE_KEY"
          "$_STRIPE_SECRET_KEY"
          "$_STRIPE_WEBHOOK_SECRET"
          "$_MEDUSA_ADMIN_EMAIL"
          "$_MEDUSA_ADMIN_PASSWORD"
        )

        for value in "${required_values[@]}"; do
          if [ -z "$value" ]; then
            echo "Missing one or more required Cloud Build substitutions."
            exit 1
          fi
        done

        random_secret() {
          python3 - <<'PY'
import secrets
print(secrets.token_urlsafe(32))
PY
        }

        get_service_env() {
          local service_name="$1"
          local env_name="$2"

          gcloud run services describe "$service_name" \
            --region "$_REGION" \
            --project "$PROJECT_ID" \
            --format export 2>/dev/null | awk -v env_name="$env_name" '
              $1 == "- name:" && $3 == env_name { in_target = 1; next }
              in_target && $1 == "value:" {
                value = substr($0, index($0, ":") + 2)
                gsub(/^"/, "", value)
                gsub(/"$/, "", value)
                print value
                exit
              }
              $1 == "- name:" { in_target = 0 }
            '
        }

        extract_db_password() {
          local database_url="$1"
          python3 - "$database_url" <<'PY'
import sys
from urllib.parse import urlparse

url = sys.argv[1]
if not url:
    raise SystemExit(0)

password = urlparse(url).password
if password:
    print(password)
PY
        }

        hello_image="us-docker.pkg.dev/cloudrun/container/hello"

        ensure_service_url() {
          local service_name="$1"

          if ! gcloud run services describe "$service_name" \
            --region "$_REGION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            gcloud run deploy "$service_name" \
              --image "$hello_image" \
              --region "$_REGION" \
              --project "$PROJECT_ID" \
              --platform managed \
              --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
              --allow-unauthenticated \
              --quiet
          fi

          gcloud run services describe "$service_name" \
            --region "$_REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)'
        }

        commerce_url="$(ensure_service_url "$_COMMERCE_SERVICE")"
        ops_api_url="$(ensure_service_url "$_OPS_API_SERVICE")"
        storefront_url="$(ensure_service_url "$_STOREFRONT_SERVICE")"
        resolved_db_password="$_DB_PASSWORD"
        resolved_jwt_secret="$_JWT_SECRET"
        resolved_cookie_secret="$_COOKIE_SECRET"

        if [ -z "$resolved_db_password" ]; then
          existing_database_url="$(get_service_env "$_COMMERCE_SERVICE" DATABASE_URL)"
          resolved_db_password="$(extract_db_password "$existing_database_url")"
        fi

        if [ -z "$resolved_jwt_secret" ]; then
          resolved_jwt_secret="$(get_service_env "$_COMMERCE_SERVICE" JWT_SECRET)"
        fi

        if [ -z "$resolved_cookie_secret" ]; then
          resolved_cookie_secret="$(get_service_env "$_COMMERCE_SERVICE" COOKIE_SECRET)"
        fi

        if [ -z "$resolved_db_password" ]; then
          resolved_db_password="$(random_secret)"
        fi

        if [ -z "$resolved_jwt_secret" ]; then
          resolved_jwt_secret="$(random_secret)"
        fi

        if [ -z "$resolved_cookie_secret" ]; then
          resolved_cookie_secret="$(random_secret)"
        fi

        instance_connection_name="$(gcloud sql instances describe "$_SQL_INSTANCE" \
          --project "$PROJECT_ID" \
          --format='value(connectionName)')"
        redis_host="$(gcloud redis instances describe "$_REDIS_INSTANCE" \
          --region "$_REGION" \
          --project "$PROJECT_ID" \
          --format='value(host)')"
        redis_port="$(gcloud redis instances describe "$_REDIS_INSTANCE" \
          --region "$_REGION" \
          --project "$PROJECT_ID" \
          --format='value(port)')"
        gcloud sql users set-password "$_SQL_USER" \
          --instance "$_SQL_INSTANCE" \
          --project "$PROJECT_ID" \
          --password "$resolved_db_password" \
          --quiet

        cat > /workspace/cloudrun.vars <<EOF
        project_id=$PROJECT_ID
        region=$_REGION
        ar_repo=$_AR_REPO
        commerce_service=$_COMMERCE_SERVICE
        ops_api_service=$_OPS_API_SERVICE
        storefront_service=$_STOREFRONT_SERVICE
        commerce_url=$commerce_url
        ops_api_url=$ops_api_url
        storefront_url=$storefront_url
        instance_connection_name=$instance_connection_name
        redis_host=$redis_host
        redis_port=$redis_port
        build_tag=$BUILD_ID
        db_password=$resolved_db_password
        jwt_secret=$resolved_jwt_secret
        cookie_secret=$resolved_cookie_secret
        EOF

  - name: gcr.io/cloud-builders/docker
    id: build-images
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/cloudrun.vars

        commerce_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/commerce:${build_tag}"
        ops_api_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/ops-api:${build_tag}"
        storefront_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/storefront:${build_tag}"

        docker build \
          -f infra/cloud-run/Dockerfile.ops-api \
          -t "$ops_api_image" \
          .

        docker build \
          -f infra/cloud-run/Dockerfile.storefront \
          -t "$storefront_image" \
          .

        docker build \
          -f infra/cloud-run/Dockerfile.commerce \
          --build-arg VITE_OPS_API_URL="$ops_api_url" \
          --build-arg VITE_STOREFRONT_URL="$storefront_url" \
          -t "$commerce_image" \
          .

        docker push "$ops_api_image"
        docker push "$storefront_image"
        docker push "$commerce_image"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-services
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/cloudrun.vars

        commerce_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/commerce:${build_tag}"
        ops_api_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/ops-api:${build_tag}"
        storefront_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/storefront:${build_tag}"
        database_url="postgresql://${_SQL_USER}:${db_password}@/${_SQL_DATABASE}?host=/cloudsql/${instance_connection_name}"
        redis_url="redis://${redis_host}:${redis_port}"

        cat > /workspace/commerce-env.yaml <<EOF
        NODE_ENV: "production"
        DATABASE_URL: "$database_url"
        REDIS_URL: "$redis_url"
        JWT_SECRET: "$jwt_secret"
        COOKIE_SECRET: "$cookie_secret"
        MEDUSA_BACKEND_URL: "$commerce_url"
        MEDUSA_ADMIN_PATH: "$_MEDUSA_ADMIN_PATH"
        STORE_CORS: "$storefront_url"
        ADMIN_CORS: "$commerce_url"
        AUTH_CORS: "$storefront_url,$commerce_url"
        OPS_API_BASE_URL: "$ops_api_url"
        INTERNAL_API_SECRET: "$_INTERNAL_API_SECRET"
        STRIPE_SECRET_KEY: "$_STRIPE_SECRET_KEY"
        STRIPE_WEBHOOK_SECRET: "$_STRIPE_WEBHOOK_SECRET"
        GCS_BUCKET_NAME: "$_GCS_BUCKET_NAME"
        GCS_ACCESS_KEY_ID: "$_GCS_ACCESS_KEY_ID"
        GCS_SECRET_ACCESS_KEY: "$_GCS_SECRET_ACCESS_KEY"
        GCS_REGION: "$_GCS_REGION"
        EOF

        cat > /workspace/ops-api-env.yaml <<EOF
        NODE_ENV: "production"
        OPS_API_HOST: "0.0.0.0"
        OPS_API_PORT: "8080"
        OPS_DATABASE_URL: "$database_url"
        OPS_API_ALLOWED_ORIGINS: "$storefront_url,$commerce_url"
        MEDUSA_BACKEND_URL: "$commerce_url"
        STOREFRONT_URL: "$storefront_url"
        MEDUSA_PUBLISHABLE_KEY: "$_MEDUSA_PUBLISHABLE_KEY"
        MEDUSA_ADMIN_EMAIL: "$_MEDUSA_ADMIN_EMAIL"
        MEDUSA_ADMIN_PASSWORD: "$_MEDUSA_ADMIN_PASSWORD"
        STRIPE_SECRET_KEY: "$_STRIPE_SECRET_KEY"
        RESEND_API_KEY: "$_RESEND_API_KEY"
        EMAIL_FROM: "$_EMAIL_FROM"
        EMAIL_ADMIN_RECIPIENTS: "$_EMAIL_ADMIN_RECIPIENTS"
        INTERNAL_API_SECRET: "$_INTERNAL_API_SECRET"
        GOOGLE_PLACES_API_KEY: "$_GOOGLE_PLACES_API_KEY"
        GOOGLE_PLACE_ID: "$_GOOGLE_PLACE_ID"
        LLM_PROVIDER: "$_LLM_PROVIDER"
        VERTEX_PROJECT_ID: "$_VERTEX_PROJECT_ID"
        VERTEX_LOCATION: "$_VERTEX_LOCATION"
        VERTEX_MODEL: "$_VERTEX_MODEL"
        EOF

        cat > /workspace/storefront-env.yaml <<EOF
        NODE_ENV: "production"
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: "$commerce_url"
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: "$_MEDUSA_PUBLISHABLE_KEY"
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "$_STRIPE_PUBLISHABLE_KEY"
        NEXT_PUBLIC_OPS_API_URL: "$ops_api_url"
        NEXT_PUBLIC_CHAT_SERVICE_URL: "$_NEXT_PUBLIC_CHAT_SERVICE_URL"
        GOOGLE_PLACES_API_KEY: "$_GOOGLE_PLACES_API_KEY"
        GOOGLE_PLACE_ID: "$_GOOGLE_PLACE_ID"
        NEXT_PUBLIC_GOOGLE_PLACE_URL: "$_NEXT_PUBLIC_GOOGLE_PLACE_URL"
        EOF

        gcloud run deploy "$ops_api_service" \
          --image "$ops_api_image" \
          --region "$region" \
          --project "$project_id" \
          --platform managed \
          --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
          --allow-unauthenticated \
          --port 8080 \
          --cpu 1 \
          --memory 512Mi \
          --max-instances 2 \
          --add-cloudsql-instances "$instance_connection_name" \
          --env-vars-file /workspace/ops-api-env.yaml \
          --quiet

        gcloud run deploy "$commerce_service" \
          --image "$commerce_image" \
          --region "$region" \
          --project "$project_id" \
          --platform managed \
          --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
          --allow-unauthenticated \
          --port 9000 \
          --cpu 1 \
          --memory 1Gi \
          --max-instances 2 \
          --vpc-connector "$_VPC_CONNECTOR" \
          --vpc-egress private-ranges-only \
          --add-cloudsql-instances "$instance_connection_name" \
          --env-vars-file /workspace/commerce-env.yaml \
          --quiet

        gcloud run deploy "$storefront_service" \
          --image "$storefront_image" \
          --region "$region" \
          --project "$project_id" \
          --platform managed \
          --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
          --allow-unauthenticated \
          --port 8080 \
          --cpu 1 \
          --memory 512Mi \
          --max-instances 2 \
          --env-vars-file /workspace/storefront-env.yaml \
          --quiet

        gcloud run services describe "$commerce_service" \
          --region "$region" \
          --project "$project_id" \
          --format='value(status.url)'
        gcloud run services describe "$ops_api_service" \
          --region "$region" \
          --project "$project_id" \
          --format='value(status.url)'
        gcloud run services describe "$storefront_service" \
          --region "$region" \
          --project "$project_id" \
          --format='value(status.url)'
