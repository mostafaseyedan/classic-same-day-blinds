options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _AR_REPO: cloud-run
  _COMMERCE_SERVICE: blinds-commerce
  _COMMERCE_WORKER_SERVICE: blinds-commerce-worker
  _OPS_API_SERVICE: blinds-ops-api
  _STOREFRONT_SERVICE: blinds-storefront
  _SQL_INSTANCE: blinds-postgres
  _SQL_DATABASE: blinds_commerce
  _SQL_USER: blindsapp
  _REDIS_INSTANCE: blinds-redis
  _VPC_CONNECTOR: blinds-serverless
  _RUNTIME_SERVICE_ACCOUNT: csdb-app@classic-same-day-blinds.iam.gserviceaccount.com
  _MEDUSA_ADMIN_PATH: /app
  _DB_PASSWORD: ""
  _JWT_SECRET: ""
  _COOKIE_SECRET: ""
  _INTERNAL_API_SECRET: ""
  _STRIPE_SECRET_KEY: ""
  _STRIPE_WEBHOOK_SECRET: ""
  _MEDUSA_ADMIN_EMAIL: ""
  _MEDUSA_ADMIN_PASSWORD: ""
  _GCS_BUCKET_NAME: ""
  _GCS_ACCESS_KEY_ID: ""
  _GCS_SECRET_ACCESS_KEY: ""
  _GCS_REGION: us-central1

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:565.0.0-slim
    id: prepare-runtime
    entrypoint: bash
    args:
      - -ceu
      - |
        required_values=(
          "$_STRIPE_SECRET_KEY"
          "$_STRIPE_WEBHOOK_SECRET"
          "$_MEDUSA_ADMIN_EMAIL"
          "$_MEDUSA_ADMIN_PASSWORD"
        )
        for value in "${required_values[@]}"; do
          if [ -z "$value" ]; then
            echo "Missing one or more required Cloud Build substitutions."
            exit 1
          fi
        done

        random_secret() {
          python3 -c 'import secrets; print(secrets.token_urlsafe(32))'
        }

        get_service_env() {
          local service_name="$1"
          local env_name="$2"

          gcloud run services describe "$service_name" \
            --region "$_REGION" \
            --project "$PROJECT_ID" \
            --format yaml 2>/dev/null | awk -v env_name="$env_name" '
              $1 == "-" && $2 == "name:" && $3 == env_name { in_target = 1; next }
              in_target && $1 == "value:" {
                value = substr($0, index($0, ":") + 2)
                gsub(/^"/, "", value)
                gsub(/"$/, "", value)
                print value
                exit
              }
              $1 == "-" && $2 == "name:" { in_target = 0 }
            '
        }

        extract_db_password() {
          local database_url="$1"
          python3 -c 'import sys; from urllib.parse import urlparse; url = sys.argv[1]; password = urlparse(url).password if url else None; print(password or "")' "$database_url"
        }

        hello_image="us-docker.pkg.dev/cloudrun/container/hello"

        ensure_service_url() {
          local service_name="$1"
          if ! gcloud run services describe "$service_name" \
            --region "$_REGION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            gcloud run deploy "$service_name" \
              --image "$hello_image" \
              --region "$_REGION" \
              --project "$PROJECT_ID" \
              --platform managed \
              --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
              --allow-unauthenticated \
              --quiet
          fi
          gcloud run services describe "$service_name" \
            --region "$_REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)'
        }

        get_optional_url() {
          gcloud run services describe "$1" \
            --region "$_REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)' 2>/dev/null || true
        }

        commerce_url="$(ensure_service_url "$_COMMERCE_SERVICE")"
        ops_api_url="$(get_optional_url "$_OPS_API_SERVICE")"
        storefront_url="$(get_optional_url "$_STOREFRONT_SERVICE")"

        resolved_db_password="$_DB_PASSWORD"
        resolved_jwt_secret="$_JWT_SECRET"
        resolved_cookie_secret="$_COOKIE_SECRET"
        resolved_internal_api_secret="$_INTERNAL_API_SECRET"

        if [ -z "$resolved_db_password" ]; then
          existing_database_url="$(get_service_env "$_COMMERCE_SERVICE" DATABASE_URL)"
          resolved_db_password="$(extract_db_password "$existing_database_url")"
        fi

        if [ -z "$resolved_jwt_secret" ]; then
          resolved_jwt_secret="$(get_service_env "$_COMMERCE_SERVICE" JWT_SECRET)"
        fi

        if [ -z "$resolved_cookie_secret" ]; then
          resolved_cookie_secret="$(get_service_env "$_COMMERCE_SERVICE" COOKIE_SECRET)"
        fi

        if [ -z "$resolved_internal_api_secret" ]; then
          resolved_internal_api_secret="$(get_service_env "$_COMMERCE_SERVICE" INTERNAL_API_SECRET)"
        fi

        if [ -z "$resolved_internal_api_secret" ]; then
          resolved_internal_api_secret="$(get_service_env "$_OPS_API_SERVICE" INTERNAL_API_SECRET)"
        fi

        if [ -z "$resolved_db_password" ]; then
          resolved_db_password="$(random_secret)"
        fi

        if [ -z "$resolved_jwt_secret" ]; then
          resolved_jwt_secret="$(random_secret)"
        fi

        if [ -z "$resolved_cookie_secret" ]; then
          resolved_cookie_secret="$(random_secret)"
        fi

        if [ -z "$resolved_internal_api_secret" ]; then
          resolved_internal_api_secret="$(random_secret)"
        fi

        instance_connection_name="$(gcloud sql instances describe "$_SQL_INSTANCE" \
          --project "$PROJECT_ID" \
          --format='value(connectionName)')"
        redis_host="$(gcloud redis instances describe "$_REDIS_INSTANCE" \
          --region "$_REGION" \
          --project "$PROJECT_ID" \
          --format='value(host)')"
        redis_port="$(gcloud redis instances describe "$_REDIS_INSTANCE" \
          --region "$_REGION" \
          --project "$PROJECT_ID" \
          --format='value(port)')"

        gcloud sql users set-password "$_SQL_USER" \
          --instance "$_SQL_INSTANCE" \
          --project "$PROJECT_ID" \
          --password "$resolved_db_password" \
          --quiet

        cat > /workspace/cloudrun.vars <<EOF
        project_id=$PROJECT_ID
        region=$_REGION
        ar_repo=$_AR_REPO
        commerce_service=$_COMMERCE_SERVICE
        ops_api_url=$ops_api_url
        storefront_url=$storefront_url
        commerce_url=$commerce_url
        instance_connection_name=$instance_connection_name
        redis_host=$redis_host
        redis_port=$redis_port
        build_tag=$BUILD_ID
        db_password=$resolved_db_password
        jwt_secret=$resolved_jwt_secret
        cookie_secret=$resolved_cookie_secret
        internal_api_secret=$resolved_internal_api_secret
        EOF

  - name: node:22-bullseye-slim
    id: prepare-buildpack-contexts
    entrypoint: bash
    args:
      - -ceu
      - |
        node infra/cloud-run/prepare-buildpack-contexts.mjs commerce

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:565.0.0-slim
    id: setup-pack
    entrypoint: bash
    args:
      - -ceu
      - |
        pack_version="v0.40.3"
        curl -sSfL "https://github.com/buildpacks/pack/releases/download/${pack_version}/pack-${pack_version}-linux.tgz" \
          | tar xz -C /workspace pack
        chmod +x /workspace/pack
        /workspace/pack --version

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:565.0.0-slim
    id: build-commerce-image
    waitFor:
      - prepare-buildpack-contexts
      - setup-pack
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/cloudrun.vars

        commerce_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/commerce:${build_tag}"
        commerce_cache_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/commerce-build-cache:latest"

        /workspace/pack build "$commerce_image" \
          --builder gcr.io/buildpacks/builder:latest \
          --path .cloudrun/commerce \
          --cache-image "$commerce_cache_image" \
          --env GOOGLE_NODEJS_VERSION=22.x.x \
          --env GOOGLE_NODE_RUN_SCRIPTS=build \
          --env NPM_CONFIG_AUDIT=false \
          --env NPM_CONFIG_FUND=false \
          --env NODE_ENV=production \
          --env MEDUSA_BACKEND_URL="$commerce_url" \
          --env DATABASE_URL="postgresql://build:build@localhost/build" \
          --env REDIS_URL="redis://localhost:6379" \
          --network cloudbuild \
          --publish

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:565.0.0-slim
    id: deploy-commerce
    waitFor:
      - build-commerce-image
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/cloudrun.vars

        commerce_worker_service="${_COMMERCE_WORKER_SERVICE}"
        commerce_image="${region}-docker.pkg.dev/${project_id}/${ar_repo}/commerce:${build_tag}"
        socket_host="$(python3 -c "import urllib.parse; print(urllib.parse.quote('/cloudsql/${instance_connection_name}', safe=''))")"
        database_url="postgresql://${_SQL_USER}:${db_password}@${socket_host}/${_SQL_DATABASE}"
        redis_url="redis://${redis_host}:${redis_port}"

        cat > /workspace/commerce-server-env.yaml <<EOF
        NODE_ENV: "production"
        DATABASE_URL: "$database_url"
        REDIS_URL: "$redis_url"
        JWT_SECRET: "$jwt_secret"
        COOKIE_SECRET: "$cookie_secret"
        RUN_DB_MIGRATIONS: "true"
        MEDUSA_WORKER_MODE: "server"
        DISABLE_MEDUSA_ADMIN: "false"
        MEDUSA_BACKEND_URL: "$commerce_url"
        MEDUSA_ADMIN_PATH: "$_MEDUSA_ADMIN_PATH"
        STORE_CORS: "$storefront_url"
        ADMIN_CORS: "$commerce_url"
        AUTH_CORS: "$storefront_url,$commerce_url"
        OPS_API_BASE_URL: "$ops_api_url"
        INTERNAL_API_SECRET: "$internal_api_secret"
        STRIPE_SECRET_KEY: "$_STRIPE_SECRET_KEY"
        STRIPE_WEBHOOK_SECRET: "$_STRIPE_WEBHOOK_SECRET"
        GCS_BUCKET_NAME: "$_GCS_BUCKET_NAME"
        GCS_ACCESS_KEY_ID: "$_GCS_ACCESS_KEY_ID"
        GCS_SECRET_ACCESS_KEY: "$_GCS_SECRET_ACCESS_KEY"
        GCS_REGION: "$_GCS_REGION"
        EOF

        cat > /workspace/commerce-worker-env.yaml <<EOF
        NODE_ENV: "production"
        DATABASE_URL: "$database_url"
        REDIS_URL: "$redis_url"
        JWT_SECRET: "$jwt_secret"
        COOKIE_SECRET: "$cookie_secret"
        RUN_DB_MIGRATIONS: "false"
        MEDUSA_WORKER_MODE: "worker"
        DISABLE_MEDUSA_ADMIN: "true"
        MEDUSA_BACKEND_URL: "$commerce_url"
        MEDUSA_ADMIN_PATH: "$_MEDUSA_ADMIN_PATH"
        STORE_CORS: "$storefront_url"
        ADMIN_CORS: "$commerce_url"
        AUTH_CORS: "$storefront_url,$commerce_url"
        OPS_API_BASE_URL: "$ops_api_url"
        INTERNAL_API_SECRET: "$internal_api_secret"
        STRIPE_SECRET_KEY: "$_STRIPE_SECRET_KEY"
        STRIPE_WEBHOOK_SECRET: "$_STRIPE_WEBHOOK_SECRET"
        GCS_BUCKET_NAME: "$_GCS_BUCKET_NAME"
        GCS_ACCESS_KEY_ID: "$_GCS_ACCESS_KEY_ID"
        GCS_SECRET_ACCESS_KEY: "$_GCS_SECRET_ACCESS_KEY"
        GCS_REGION: "$_GCS_REGION"
        EOF

        gcloud run deploy "$commerce_service" \
          --image "$commerce_image" \
          --region "$region" \
          --project "$project_id" \
          --platform managed \
          --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
          --allow-unauthenticated \
          --port 9000 \
          --cpu 1 \
          --memory 1Gi \
          --max-instances 2 \
          --vpc-connector "$_VPC_CONNECTOR" \
          --vpc-egress private-ranges-only \
          --add-cloudsql-instances "$instance_connection_name" \
          --env-vars-file /workspace/commerce-server-env.yaml \
          --quiet

        gcloud run deploy "$commerce_worker_service" \
          --image "$commerce_image" \
          --region "$region" \
          --project "$project_id" \
          --platform managed \
          --service-account "$_RUNTIME_SERVICE_ACCOUNT" \
          --no-allow-unauthenticated \
          --port 9000 \
          --cpu 1 \
          --memory 1Gi \
          --max-instances 1 \
          --vpc-connector "$_VPC_CONNECTOR" \
          --vpc-egress private-ranges-only \
          --add-cloudsql-instances "$instance_connection_name" \
          --env-vars-file /workspace/commerce-worker-env.yaml \
          --quiet

        gcloud run services describe "$commerce_service" \
          --region "$region" \
          --project "$project_id" \
          --format='value(status.url)'
        gcloud run services describe "$commerce_worker_service" \
          --region "$region" \
          --project "$project_id" \
          --format='value(status.url)'
